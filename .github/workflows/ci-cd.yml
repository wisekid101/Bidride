name: BidRide CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  AWS_REGION: us-east-1

jobs:
  # ─── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run test --filter='./services/*'
        env:
          NODE_ENV: test
      - uses: codecov/codecov-action@v4
        with: { token: '${{ secrets.CODECOV_TOKEN }}' }

  # ─── Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bidride_test
          POSTGRES_USER: bidride
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run DB migrations
        run: pnpm db:migrate:prod
        env:
          DATABASE_URL: postgresql://bidride:test_password@localhost:5432/bidride_test
      - name: Integration tests
        run: pnpm turbo run test:int
        env:
          DATABASE_URL: postgresql://bidride:test_password@localhost:5432/bidride_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_for_ci_only
          NODE_ENV: test

  # ─── Build Docker Images ───────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service:
          - auth-service
          - trip-service
          - driver-service
          - rider-service
          - pricing-service
          - safety-service
          - payment-service
          - notification-service
          - trust-service
          - airport-service
          - admin-service

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t $ECR_REGISTRY/bidride-${{ matrix.service }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/bidride-${{ matrix.service }}:latest \
            --cache-from $ECR_REGISTRY/bidride-${{ matrix.service }}:latest \
            .
          docker push $ECR_REGISTRY/bidride-${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/bidride-${{ matrix.service }}:latest

  # ─── Deploy Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster bidride-staging \
            --task-definition bidride-migrations \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["pnpm","db:migrate:prod"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNETS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}]}"
      - name: Update ECS services
        run: |
          for service in auth trip driver rider pricing safety payment notification trust airport admin; do
            aws ecs update-service \
              --cluster bidride-staging \
              --service bidride-${service}-service \
              --force-new-deployment
          done
      - name: Wait for deployment
        run: |
          for service in auth trip driver rider pricing safety payment notification trust airport admin; do
            aws ecs wait services-stable \
              --cluster bidride-staging \
              --services bidride-${service}-service
          done
      - name: Smoke tests
        run: curl -f https://staging-api.bidride.com/v1/health

  # ─── Deploy Production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production  # Requires manual approval in GitHub Environments
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pre-migration RDS snapshot
        run: |
          aws rds create-db-snapshot \
            --db-instance-identifier bidride-production \
            --db-snapshot-identifier bidride-pre-deploy-${{ github.sha }}

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster bidride-production \
            --task-definition bidride-migrations \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["pnpm","db:migrate:prod"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PROD_PRIVATE_SUBNETS }}],securityGroups=[${{ secrets.PROD_ECS_SECURITY_GROUP }}]}"

      - name: Blue-green deploy — Safety Service first (always)
        run: |
          aws ecs update-service \
            --cluster bidride-production \
            --service bidride-safety-service \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster bidride-production \
            --services bidride-safety-service

      - name: Deploy remaining services
        run: |
          for service in auth trip driver rider pricing payment notification trust airport admin; do
            aws ecs update-service \
              --cluster bidride-production \
              --service bidride-${service}-service \
              --force-new-deployment
          done

      - name: Wait for all services
        run: |
          for service in auth trip driver rider pricing payment notification trust airport admin; do
            aws ecs wait services-stable \
              --cluster bidride-production \
              --services bidride-${service}-service
          done

      - name: Production smoke tests
        run: |
          curl -f https://api.bidride.com/v1/health
          curl -f https://admin.bidride.com/health

      - name: Notify on success
        if: success()
        run: |
          echo "Production deploy succeeded: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Production deploy FAILED: ${{ github.sha }} — Investigate immediately"
